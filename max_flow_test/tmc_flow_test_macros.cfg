# TMC Flow Test — Mainsail / Fluidd macro wrapper + plugin config
# ────────────────────────────────────────────────────────────────────
# This file contains BOTH the [tmc_flow_test] plugin config AND the
# Mainsail/Fluidd macro wrappers. After install it's pulled into your
# printer.cfg via [include tmc_flow_test_macros.cfg].
#
# IMPORTANT: review and adjust the values in [tmc_flow_test] below to
# match your actual hardware (extruder name, filament diameter, melt
# zone length). The defaults match a Sherpa-Mini-class hotend with a
# 1.75 mm filament feed.
# ────────────────────────────────────────────────────────────────────


# ════════════════════════════════════════════════════════════════════
# Plugin configuration
# ════════════════════════════════════════════════════════════════════

[tmc_flow_test]
# REQUIRED: name of the stepper to test (must match your extruder
# section name in printer.cfg, usually 'extruder')
extruder_stepper: extruder
# Filament diameter in mm (default: 1.75)
filament_diameter: 1.75
# Length of the hotend melt zone in mm (default: 42).
# Used for diagnostic info and hotend-class hints in the report.
# Common values:
#   V6 / Revo Six:                ~13 mm
#   Volcano:                      ~21 mm
#   Mosquito:                     ~18 mm
#   Sherpa Mini / high-flow:      ~42 mm
#   Goliath / Bondtech CHT-XL:    ~50 mm
melt_zone_length: 42

# ─── Optional: part-cooling fan speed during the test ───────────────
# Once the test starts, the fan is locked at this percentage (0-100).
# Default 0 = fan off. Override per-run with FAN_SPEED= parameter on
# TMC_FLOW_FIND_MAX. Fan speed materially affects max flow (heater
# has to do 10-20 % more work at 100 % fan), so consistency matters.
#test_fan_speed: 0

# ─── Optional: explicitly name the part-cooling fan ─────────────────
# By default the plugin drives the printer's primary part-cooling fan
# via M106. Only set this if your fan is at a non-standard object name.
#fan_object_name: fan_generic part_cooling

# ─── Optional: log additional thermistors during the test ───────────
# Comma-separated list of thermistor objects to track alongside the
# extruder's. Useful for chamber, heatbreak, ambient, etc. Each name
# must be the full Klipper config-section header.
#extra_thermistors: temperature_sensor chamber, temperature_sensor heatbreak

# ─── Optional: minimum hotend temperature for safety check ──────────
# The plugin refuses to run if the hotend is colder than this value.
# Lower it only if you know what you're doing.
#min_hotend_temp: 180

# ─── Optional: where to save CSV and HTML reports ───────────────────
# Default: ~/printer_data/config/Flowtest/
#output_dir: ~/printer_data/config/Flowtest


# ════════════════════════════════════════════════════════════════════
# Mainsail / Fluidd macros
# ════════════════════════════════════════════════════════════════════


[gcode_macro CRYD_FLOW_TEST]
description: Run a TMC StallGuard-based max-volumetric-flow test with all parameters exposed
gcode:
    {% set start = params.START|default(10)|float %}
    {% set max_f = params.MAX|default(80)|float %}
    {% set coarse = params.COARSE_STEP|default(5)|float %}
    {% set min_step = params.MIN_STEP|default(1)|float %}
    {% set duration = params.DURATION|default(5)|float %}
    {% set repeat = params.REPEAT|default(5)|int %}
    {% set verify = params.VERIFY_REPEATS|default(5)|int %}
    {% set cooldown = params.COOLDOWN|default(15)|float %}
    {% set purge = params.PURGE|default(0)|float %}
    {% set max_bisect = params.MAX_BISECT_STEPS|default(6)|int %}
    {% set auto_sgt = params.AUTO_SGT|default(1)|int %}
    {% set keep_sgt = params.KEEP_SGT|default(0)|int %}
    {% set fan_speed = params.FAN_SPEED|default(0)|float %}
    {% set no_html = params.NO_HTML|default(0)|int %}
    {% set skip_check = params.SKIP_TMC_CHECK|default(0)|int %}
    {% set cold_hint = params.COLD_EXTRUSION_HINT|default(0)|float %}
    M118 Starting TMC Flow Test (START={start} MAX={max_f} COARSE_STEP={coarse} FAN={fan_speed}%)
    TMC_FLOW_FIND_MAX START={start} MAX={max_f} COARSE_STEP={coarse}
                      MIN_STEP={min_step} DURATION={duration}
                      REPEAT={repeat} VERIFY_REPEATS={verify}
                      COOLDOWN={cooldown} PURGE={purge}
                      MAX_BISECT_STEPS={max_bisect}
                      AUTO_SGT={auto_sgt} KEEP_SGT={keep_sgt}
                      FAN_SPEED={fan_speed}
                      NO_HTML={no_html} SKIP_TMC_CHECK={skip_check}
                      COLD_EXTRUSION_HINT={cold_hint}


# ────────────────────────────────────────────────────────────────────
# Quick-presets — single-button convenience macros for common
# hotend-class setups. Pick the one that matches your hardware and
# bind it to a Mainsail/Fluidd dashboard button.
# ────────────────────────────────────────────────────────────────────

[gcode_macro CRYD_FLOW_TEST_V6]
description: V6 stock 0.4 — low-flow setup (~15 mm³/s expected)
gcode:
    CRYD_FLOW_TEST START=5 MAX=25 COARSE_STEP=5 {rawparams}


[gcode_macro CRYD_FLOW_TEST_VOLCANO]
description: Volcano / CHT 0.4 — medium-flow setup (~25 mm³/s expected)
gcode:
    CRYD_FLOW_TEST START=10 MAX=40 COARSE_STEP=5 {rawparams}


[gcode_macro CRYD_FLOW_TEST_RAPIDO]
description: Rapido HF 0.4 — medium/high-flow setup (~30 mm³/s expected)
gcode:
    CRYD_FLOW_TEST START=10 MAX=60 COARSE_STEP=5 {rawparams}


[gcode_macro CRYD_FLOW_TEST_RAPIDO_06]
description: Rapido HF 0.6 / Mosquito Magnum — high-flow setup (~50 mm³/s expected)
gcode:
    CRYD_FLOW_TEST START=15 MAX=80 COARSE_STEP=5 {rawparams}


[gcode_macro CRYD_FLOW_TEST_GOLIATH]
description: Goliath / CHT 0.8 — extreme-flow setup (~80 mm³/s expected)
gcode:
    CRYD_FLOW_TEST START=25 MAX=120 COARSE_STEP=5 {rawparams}


[gcode_macro CRYD_FLOW_TEST_DISCOVERY]
description: Unknown hotend — full discovery sweep
gcode:
    CRYD_FLOW_TEST START=10 MAX=150 COARSE_STEP=5 {rawparams}


# ────────────────────────────────────────────────────────────────────
# Diagnostic helpers
# ────────────────────────────────────────────────────────────────────

[gcode_macro CRYD_FLOW_STATUS]
description: Verify TMC config + StallGuard before running a flow test
gcode:
    {% set activate = params.ACTIVATE|default(1)|int %}
    TMC_FLOW_STATUS ACTIVATE={activate}


[gcode_macro CRYD_FLOW_TMC2209_PREFLIGHT]
description: TMC2209 SG4 pre-flight check (mandatory before relying on results)
gcode:
    {% set low = params.LOW_FLOW|default(30)|float %}
    {% set high = params.HIGH_FLOW|default(140)|float %}
    {% set duration = params.DURATION|default(8)|float %}
    {% set repeat = params.REPEAT|default(5)|int %}
    {% set sgthrs = params.SGTHRS|default(100)|int %}
    M118 TMC2209 Pre-Flight: LOW={low} HIGH={high} — motor will likely slip at HIGH
    TMC_FLOW_TEST_SG_VARIANTS LOW_FLOW={low} HIGH_FLOW={high}
                              DURATION={duration} REPEAT={repeat}
                              SGTHRS={sgthrs}
