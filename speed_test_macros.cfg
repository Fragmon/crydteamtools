[gcode_macro ST_FIND_OPTIMAL_CURRENT]
description: Lowest run_current that still passes a SPEED/ACCEL target
gcode:
  {% set cmd = 'SPEED_TEST_FIND_OPTIMAL_CURRENT' %}
  {% if params.AXIS is defined %}{% set cmd = cmd ~ ' AXIS=' ~ params.AXIS %}{% endif %}
  {% if params.SPEED is defined %}{% set cmd = cmd ~ ' SPEED=' ~ params.SPEED %}{% endif %}
  {% if params.ACCEL is defined %}{% set cmd = cmd ~ ' ACCEL=' ~ params.ACCEL %}{% endif %}
  {% if params.MAX_CURRENT is defined %}{% set cmd = cmd ~ ' MAX_CURRENT=' ~ params.MAX_CURRENT %}{% endif %}
  {% if params.MIN_CURRENT is defined %}{% set cmd = cmd ~ ' MIN_CURRENT=' ~ params.MIN_CURRENT %}{% endif %}
  {% if params.COARSE_STEP is defined %}{% set cmd = cmd ~ ' COARSE_STEP=' ~ params.COARSE_STEP %}{% endif %}
  {% if params.MIN_STEP is defined %}{% set cmd = cmd ~ ' MIN_STEP=' ~ params.MIN_STEP %}{% endif %}
  {% if params.SAFETY_MARGIN is defined %}{% set cmd = cmd ~ ' SAFETY_MARGIN=' ~ params.SAFETY_MARGIN %}{% endif %}
  {% if params.REPEAT is defined %}{% set cmd = cmd ~ ' REPEAT=' ~ params.REPEAT %}{% endif %}
  {% if params.VERIFY_REPEATS is defined %}{% set cmd = cmd ~ ' VERIFY_REPEATS=' ~ params.VERIFY_REPEATS %}{% endif %}
  {% if params.MAX_BISECT_STEPS is defined %}{% set cmd = cmd ~ ' MAX_BISECT_STEPS=' ~ params.MAX_BISECT_STEPS %}{% endif %}
  {% if params.MAX_DIST_FACTOR is defined %}{% set cmd = cmd ~ ' MAX_DIST_FACTOR=' ~ params.MAX_DIST_FACTOR %}{% endif %}
  {% if params.SHORT_BIAS is defined %}{% set cmd = cmd ~ ' SHORT_BIAS=' ~ params.SHORT_BIAS %}{% endif %}
  {% if params.SEED is defined %}{% set cmd = cmd ~ ' SEED=' ~ params.SEED %}{% endif %}
