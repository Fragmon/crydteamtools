[gcode_macro ST_BENCHMARK]
description: Repeatable pass/fail stress test (needs X and Y)
gcode:
  {% set cmd = 'SPEED_TEST_BENCHMARK' %}
  {% if params.SPEED is defined %}{% set cmd = cmd ~ ' SPEED=' ~ params.SPEED %}{% endif %}
  {% if params.ACCEL is defined %}{% set cmd = cmd ~ ' ACCEL=' ~ params.ACCEL %}{% endif %}
  {% if params.ITERATIONS is defined %}{% set cmd = cmd ~ ' ITERATIONS=' ~ params.ITERATIONS %}{% endif %}
  {% if params.SCV is defined %}{% set cmd = cmd ~ ' SCV=' ~ params.SCV %}{% endif %}
  {% if params.BOUND is defined %}{% set cmd = cmd ~ ' BOUND=' ~ params.BOUND %}{% endif %}
  {% if params.SMALLPATTERNSIZE is defined %}{% set cmd = cmd ~ ' SMALLPATTERNSIZE=' ~ params.SMALLPATTERNSIZE %}{% endif %}
  {% if params.SEED is defined %}{% set cmd = cmd ~ ' SEED=' ~ params.SEED %}{% endif %}
  {% if params.ZPOS is defined %}{% set cmd = cmd ~ ' ZPOS=' ~ params.ZPOS %}{% endif %}
  {% if params.NO_HTML is defined %}{% set cmd = cmd ~ ' NO_HTML=' ~ params.NO_HTML %}{% endif %}
  {cmd}

[gcode_macro ST_STATUS]
description: Show speed_test configuration, axes and warnings
gcode:
  SPEED_TEST_STATUS

