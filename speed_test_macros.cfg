# Crydteam speed_test - UI macros for Mainsail/Fluidd
# Include from printer.cfg:   [include speed_test_macros.cfg]
#
# Every parameter is optional. Empty fields are NOT passed on, so the
# plugin defaults (and your [speed_test] config, e.g. testbench) stay
# in charge. The macros only forward what you type.

[gcode_macro ST_FIND_LIMITS]
description: V/A limit map: sweep velocities, find max accel, trim current, print-sim benchmark
gcode:
  {% set cmd = 'SPEED_TEST_FIND_LIMITS' %}
  {% if params.AXIS is defined %}{% set cmd = cmd ~ ' AXIS=' ~ params.AXIS %}{% endif %}
  {% if params.V_MIN is defined %}{% set cmd = cmd ~ ' V_MIN=' ~ params.V_MIN %}{% endif %}
  {% if params.V_MAX is defined %}{% set cmd = cmd ~ ' V_MAX=' ~ params.V_MAX %}{% endif %}
  {% if params.V_POINTS is defined %}{% set cmd = cmd ~ ' V_POINTS=' ~ params.V_POINTS %}{% endif %}
  {% if params.A_MIN is defined %}{% set cmd = cmd ~ ' A_MIN=' ~ params.A_MIN %}{% endif %}
  {% if params.A_MAX is defined %}{% set cmd = cmd ~ ' A_MAX=' ~ params.A_MAX %}{% endif %}
  {% if params.ACCEL_ACCU is defined %}{% set cmd = cmd ~ ' ACCEL_ACCU=' ~ params.ACCEL_ACCU %}{% endif %}
  {% if params.REPEAT is defined %}{% set cmd = cmd ~ ' REPEAT=' ~ params.REPEAT %}{% endif %}
  {% if params.VERIFY_REPEATS is defined %}{% set cmd = cmd ~ ' VERIFY_REPEATS=' ~ params.VERIFY_REPEATS %}{% endif %}
  {% if params.MAX_ITERS is defined %}{% set cmd = cmd ~ ' MAX_ITERS=' ~ params.MAX_ITERS %}{% endif %}
  {% if params.BENCH_SHORT is defined %}{% set cmd = cmd ~ ' BENCH_SHORT=' ~ params.BENCH_SHORT %}{% endif %}
  {% if params.BENCH_LONG is defined %}{% set cmd = cmd ~ ' BENCH_LONG=' ~ params.BENCH_LONG %}{% endif %}
  {% if params.BENCH_CHUNK is defined %}{% set cmd = cmd ~ ' BENCH_CHUNK=' ~ params.BENCH_CHUNK %}{% endif %}
  {% if params.BENCH_CHUNK_GROW is defined %}{% set cmd = cmd ~ ' BENCH_CHUNK_GROW=' ~ params.BENCH_CHUNK_GROW %}{% endif %}
  {% if params.BENCH_DERATE is defined %}{% set cmd = cmd ~ ' BENCH_DERATE=' ~ params.BENCH_DERATE %}{% endif %}
  {% if params.FULLSPEED_FRAC is defined %}{% set cmd = cmd ~ ' FULLSPEED_FRAC=' ~ params.FULLSPEED_FRAC %}{% endif %}
  {% if params.MAX_REDO is defined %}{% set cmd = cmd ~ ' MAX_REDO=' ~ params.MAX_REDO %}{% endif %}
  {% if params.PREV_CAP is defined %}{% set cmd = cmd ~ ' PREV_CAP=' ~ params.PREV_CAP %}{% endif %}
  {% if params.FIND_CURRENT is defined %}{% set cmd = cmd ~ ' FIND_CURRENT=' ~ params.FIND_CURRENT %}{% endif %}
  {% if params.MIN_CURRENT is defined %}{% set cmd = cmd ~ ' MIN_CURRENT=' ~ params.MIN_CURRENT %}{% endif %}
  {% if params.CURRENT_MARGIN is defined %}{% set cmd = cmd ~ ' CURRENT_MARGIN=' ~ params.CURRENT_MARGIN %}{% endif %}
  {% if params.CURRENT_ACCU is defined %}{% set cmd = cmd ~ ' CURRENT_ACCU=' ~ params.CURRENT_ACCU %}{% endif %}
  {% if params.CURRENT_REPEAT is defined %}{% set cmd = cmd ~ ' CURRENT_REPEAT=' ~ params.CURRENT_REPEAT %}{% endif %}
  {% if params.MAX_DIST_FACTOR is defined %}{% set cmd = cmd ~ ' MAX_DIST_FACTOR=' ~ params.MAX_DIST_FACTOR %}{% endif %}
  {% if params.SHORT_BIAS is defined %}{% set cmd = cmd ~ ' SHORT_BIAS=' ~ params.SHORT_BIAS %}{% endif %}
  {% if params.SEED is defined %}{% set cmd = cmd ~ ' SEED=' ~ params.SEED %}{% endif %}
  {% if params.TESTBENCH is defined %}{% set cmd = cmd ~ ' TESTBENCH=' ~ params.TESTBENCH %}{% endif %}
  {% if params.NO_HTML is defined %}{% set cmd = cmd ~ ' NO_HTML=' ~ params.NO_HTML %}{% endif %}
  {cmd}

[gcode_macro ST_FIND_MAX_VELOCITY]
description: Max safe velocity for one axis (adaptive bisection)
gcode:
  {% set cmd = 'SPEED_TEST_FIND_MAX_VELOCITY' %}
  {% if params.AXIS is defined %}{% set cmd = cmd ~ ' AXIS=' ~ params.AXIS %}{% endif %}
  {% if params.MIN is defined %}{% set cmd = cmd ~ ' MIN=' ~ params.MIN %}{% endif %}
  {% if params.MAX is defined %}{% set cmd = cmd ~ ' MAX=' ~ params.MAX %}{% endif %}
  {% if params.COARSE_STEP is defined %}{% set cmd = cmd ~ ' COARSE_STEP=' ~ params.COARSE_STEP %}{% endif %}
  {% if params.MIN_STEP is defined %}{% set cmd = cmd ~ ' MIN_STEP=' ~ params.MIN_STEP %}{% endif %}
  {% if params.ACCEL is defined %}{% set cmd = cmd ~ ' ACCEL=' ~ params.ACCEL %}{% endif %}
  {% if params.CRUISE_RATIO is defined %}{% set cmd = cmd ~ ' CRUISE_RATIO=' ~ params.CRUISE_RATIO %}{% endif %}
  {% if params.REPEAT is defined %}{% set cmd = cmd ~ ' REPEAT=' ~ params.REPEAT %}{% endif %}
  {% if params.VERIFY_REPEATS is defined %}{% set cmd = cmd ~ ' VERIFY_REPEATS=' ~ params.VERIFY_REPEATS %}{% endif %}
  {% if params.MAX_BISECT_STEPS is defined %}{% set cmd = cmd ~ ' MAX_BISECT_STEPS=' ~ params.MAX_BISECT_STEPS %}{% endif %}
  {% if params.DISTANCE is defined %}{% set cmd = cmd ~ ' DISTANCE=' ~ params.DISTANCE %}{% endif %}
  {% if params.TESTBENCH is defined %}{% set cmd = cmd ~ ' TESTBENCH=' ~ params.TESTBENCH %}{% endif %}
  {% if params.NO_HTML is defined %}{% set cmd = cmd ~ ' NO_HTML=' ~ params.NO_HTML %}{% endif %}
  {cmd}

